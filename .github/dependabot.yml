version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
      day: monday
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
      include: scope
